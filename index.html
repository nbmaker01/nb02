<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>WebXR A-Frame GLB Example</title>
  <!-- A-Frame 라이브러리 불러오기 -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
  <!-- A-Frame 씬 시작 -->
  <a-scene>
    
    <!-- ========================= -->
    <!-- 카메라 + 이동 설정 -->
    <!-- ========================= -->
    <!--
      wasd-controls: 키보드(WASD) 이동
      look-controls: 마우스 시점 이동
    -->
    <a-entity id="cameraRig">
      <a-camera 
        position="0 1.6 5" 
        wasd-controls 
        look-controls>
      </a-camera>
    </a-entity>

    <!-- ========================= -->
    <!-- VR 컨트롤러 설정 -->
    <!-- ========================= -->
    <!-- 왼손 컨트롤러 -->
    <a-entity 
      laser-controls="hand: left"
      raycaster="objects: .clickable"
      line="color: red">
    </a-entity>

    <!-- 오른손 컨트롤러 -->
    <a-entity 
      laser-controls="hand: right"
      raycaster="objects: .clickable"
      line="color: blue">
    </a-entity>

    <!-- ========================= -->
    <!-- 바닥 (Plane) -->
    <!-- ========================= -->
    <a-plane 
      rotation="-90 0 0" 
      width="50" 
      height="50" 
      color="#7BC8A4">
    </a-plane>

    <!-- ========================= -->
    <!-- 하늘 (Sky) -->
    <!-- ========================= -->
    <a-sky color="#ECECEC"></a-sky>

    <!-- ========================= -->
    <!-- 조명 설정 -->
    <!-- ========================= -->
    <!-- 주변광 -->
    <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>

    <!-- 방향광 -->
    <a-light 
      type="directional" 
      position="5 10 7" 
      intensity="1">
    </a-light>

    <!-- ========================= -->
    <!-- GLB 3D 모델 -->
    <!-- ========================= -->
    <!--
      position: 앞쪽 중앙
      scale: 크게 보이도록 조정
      rotation: 약간 회전
    -->
    <a-entity 
      gltf-model="model.glb"
      position="0 0 -3"
      scale="2 2 2"
      rotation="0 30 0">
    </a-entity>

  </a-scene>
</body>
</html>/
/
