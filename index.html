<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>WebXR A-Frame GLB Example</title>
  <!-- A-Frame 라이브러리 불러오기 -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
  <!-- A-Frame 씬 시작 -->
  <a-scene>
    
    <!-- ========================= -->
    <!-- 카메라 + 이동 설정 -->
    <!-- ========================= -->
    <!-- 카메라를 더 뒤로 이동해서 큰 모델이 잘 보이게 함 -->
    <a-entity id="cameraRig">
      <a-camera 
        position="0 1.6 20" 
        wasd-controls 
        look-controls>
      </a-camera>
    </a-entity>

    <!-- ========================= -->
    <!-- VR 컨트롤러 설정 -->
    <!-- ========================= -->
    <a-entity 
      laser-controls="hand: left"
      raycaster="objects: .clickable"
      line="color: red">
    </a-entity>

    <a-entity 
      laser-controls="hand: right"
      raycaster="objects: .clickable"
      line="color: blue">
    </a-entity>

    <!-- ========================= -->
    <!-- 바닥 -->
    <!-- ========================= -->
    <a-plane 
      rotation="-90 0 0" 
      width="200" 
      height="200" 
      color="#7BC8A4">
    </a-plane>

    <!-- ========================= -->
    <!-- 하늘 -->
    <!-- ========================= -->
    <a-sky color="#ECECEC"></a-sky>

    <!-- ========================= -->
    <!-- 조명 -->
    <!-- ========================= -->
    <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>

    <a-light 
      type="directional" 
      position="10 20 10" 
      intensity="1.2">
    </a-light>

    <!-- ========================= -->
    <!-- GLB 3D 모델 (훨씬 더 크게 확대) -->
    <!-- ========================= -->
    <!--
      scale을 매우 크게 설정 (모델이 작은 경우 대응)
      카메라도 뒤로 이동해서 전체가 보이게 조정
    -->
    <a-entity 
      gltf-model="model.glb"
      position="0 0 -10"
      scale="100 100 100"
      rotation="0 30 0">
    </a-entity>

  </a-scene>
</body>
</html>
